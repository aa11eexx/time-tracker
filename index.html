<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Time Tracker">
<title>Time Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0a0f;
    --bg2:      #13131e;
    --bg3:      #1a1a28;
    --border:   #252535;
    --green:    #00e676;
    --green2:   #00b85a;
    --yellow:   #ffd740;
    --red:      #ff4d6d;
    --text:     #e8e8f0;
    --dim:      #55556a;
    --sub:      #8888a8;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── Header ── */
  .header {
    padding: 20px 20px 8px;
    text-align: center;
  }
  .header-label {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--green);
    opacity: .7;
    margin-bottom: 10px;
  }

  /* ── Name input ── */
  .name-wrap {
    padding: 0 20px 6px;
  }
  .name-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    padding: 12px 16px;
    outline: none;
    transition: border-color .2s;
  }
  .name-input:focus { border-color: var(--green); }
  .name-hint {
    text-align: center;
    font-size: 10px;
    color: var(--dim);
    margin-top: 5px;
  }

  /* ── Separator ── */
  .sep { height: 1px; background: var(--border); margin: 12px 20px; }

  /* ── Resume banner ── */
  .resume-banner {
    min-height: 22px;
    text-align: center;
    font-size: 11px;
    color: var(--yellow);
    padding: 0 20px 4px;
    line-height: 1.4;
  }

  /* ── Timer box ── */
  .timer-box {
    margin: 0 20px 8px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 16px 20px;
    text-align: center;
    transition: border-color .4s;
  }
  .timer-box.running { border-color: var(--green); }
  .timer-box.loaded  { border-color: var(--yellow); }

  .timer-display {
    font-size: clamp(44px, 14vw, 64px);
    font-weight: 300;
    letter-spacing: 2px;
    color: var(--dim);
    transition: color .3s;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .timer-display.running { color: var(--green); }
  .timer-display.loaded  { color: var(--yellow); }

  .status {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: color .3s;
  }
  .status.running { color: var(--green); }
  .status.loaded  { color: var(--yellow); }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
  }
  .dot.blink { animation: blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── Buttons ── */
  .btn-row {
    display: flex;
    gap: 10px;
    padding: 0 20px 8px;
  }
  .btn {
    flex: 1;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 15px 10px;
    cursor: pointer;
    transition: all .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(.96); }
  .btn-start  { background: var(--green); color: #0a0a0f; }
  .btn-stop   { background: var(--red);   color: #fff; }
  .btn-cancel {
    flex: 0 0 54px;
    background: var(--bg3);
    color: var(--sub);
    border: 1px solid var(--border);
  }
  .btn:disabled { background: var(--bg3); color: var(--dim);
                  border: 1px solid var(--border); pointer-events: none; }

  /* ── Save banner ── */
  .save-banner {
    min-height: 20px;
    text-align: center;
    font-size: 11px;
    color: var(--green);
    padding: 0 20px 6px;
  }

  /* ── History ── */
  .hist-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px 8px;
  }
  .hist-title { font-size: 10px; letter-spacing: 3px; color: var(--dim); }
  .hist-total { font-size: 10px; color: var(--green); }

  .hist-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Project card */
  .proj-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .proj-card.selected { border-color: var(--yellow); }

  .proj-header {
    display: flex;
    align-items: center;
    padding: 13px 14px;
    cursor: pointer;
    gap: 10px;
    -webkit-tap-highlight-color: transparent;
  }
  .proj-chevron {
    font-size: 11px;
    color: var(--dim);
    transition: transform .2s;
    flex-shrink: 0;
  }
  .proj-chevron.open { transform: rotate(90deg); }
  .proj-icon { font-size: 15px; flex-shrink: 0; }
  .proj-name {
    flex: 1;
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .proj-total {
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
    flex-shrink: 0;
  }
  .proj-total.resumed { color: var(--yellow); }

  .proj-delete {
    background: none;
    border: none;
    color: var(--dim);
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  /* Entries */
  .entries { display: none; border-top: 1px solid var(--border); }
  .entries.open { display: block; }

  .entry-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 10px 38px;
    border-bottom: 1px solid rgba(255,255,255,.04);
    gap: 8px;
  }
  .entry-row:last-child { border-bottom: none; }
  .entry-date { font-size: 12px; color: var(--sub); flex: 1; }
  .entry-dur  { font-size: 12px; color: var(--sub); flex-shrink: 0; }
  .entry-del  {
    background: none; border: none;
    color: var(--border); font-size: 16px;
    cursor: pointer; padding: 0 2px;
    -webkit-tap-highlight-color: transparent;
  }

  .empty-msg {
    text-align: center;
    color: var(--dim);
    font-size: 12px;
    letter-spacing: 2px;
    padding: 30px 0;
  }

  /* scrollbar */
  .hist-list::-webkit-scrollbar { width: 4px; }
  .hist-list::-webkit-scrollbar-track { background: transparent; }
  .hist-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">TIME TRACKER</div>
</div>

<div class="name-wrap">
  <input class="name-input" id="nameInput" type="text" value="Môj projekt" maxlength="40">
  <div class="name-hint">← názov projektu / programu</div>
</div>

<div class="sep"></div>

<div class="resume-banner" id="resumeBanner"></div>

<div class="timer-box" id="timerBox">
  <div class="timer-display" id="timerDisplay">00:00:00</div>
  <div class="status" id="statusEl">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">NEČINNÝ</span>
  </div>
</div>

<div class="btn-row" id="btnRow">
  <button class="btn btn-start" id="btnStart" onclick="startTracking()">▶  SPUSTIŤ</button>
  <button class="btn btn-stop"  id="btnStop"  onclick="stopTracking()" disabled>■  ZASTAVIŤ</button>
</div>

<div class="save-banner" id="saveBanner"></div>

<div class="sep"></div>

<div class="hist-header">
  <div class="hist-title">HISTÓRIA PROJEKTOV</div>
  <div class="hist-total" id="grandTotal"></div>
</div>

<div class="hist-list" id="histList"></div>

<script>
// ── Storage ──────────────────────────────────────────────────────────────────
function loadProjects() {
  try { return JSON.parse(localStorage.getItem('tt_projects') || '[]'); }
  catch { return []; }
}
function saveProjects(p) {
  localStorage.setItem('tt_projects', JSON.stringify(p));
}

// ── State ────────────────────────────────────────────────────────────────────
let projects      = loadProjects();
let isRunning     = false;
let startTime     = null;
let baseMs        = 0;
let activeProject = null;   // projekt dict pri pokračovaní
let tickId        = null;
let openProjects  = new Set();

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmsDur(ms) {
  const t = Math.floor(ms / 1000);
  const h = Math.floor(t / 3600);
  const m = Math.floor((t % 3600) / 60);
  const s = t % 60;
  if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
  if (m > 0) return `${m}m ${String(s).padStart(2,'0')}s`;
  return `${s}s`;
}
function fmsTimer(ms) {
  const t = Math.floor(ms / 1000);
  const h = Math.floor(t / 3600);
  const m = Math.floor((t % 3600) / 60);
  const s = t % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}
function fmtDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  const days = ['Nedeľa','Pondelok','Utorok','Streda','Štvrtok','Piatok','Sobota'];
  return `${days[d.getDay()]}  ${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}
function projTotal(proj) {
  return proj.entries.reduce((a, e) => a + e.duration_ms, 0);
}

// ── Timer ────────────────────────────────────────────────────────────────────
function tick() {
  const elapsed = baseMs + (Date.now() - startTime);
  document.getElementById('timerDisplay').textContent = fmsTimer(elapsed);
  tickId = requestAnimationFrame(tick);
}

function setUIRunning(color) {
  const box  = document.getElementById('timerBox');
  const disp = document.getElementById('timerDisplay');
  const stat = document.getElementById('statusEl');
  const dot  = document.getElementById('statusDot');
  const txt  = document.getElementById('statusText');
  box.className  = 'timer-box ' + color;
  disp.className = 'timer-display ' + color;
  stat.className = 'status ' + color;
  dot.className  = 'dot blink';
  txt.textContent = 'SLEDUJE SA';
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').disabled  = false;
}

function setUIIdle(loaded) {
  const box  = document.getElementById('timerBox');
  const disp = document.getElementById('timerDisplay');
  const stat = document.getElementById('statusEl');
  const dot  = document.getElementById('statusDot');
  const txt  = document.getElementById('statusText');
  if (loaded) {
    box.className  = 'timer-box loaded';
    disp.className = 'timer-display loaded';
    stat.className = 'status loaded';
    txt.textContent = 'PRIPRAVENÉ';
  } else {
    box.className  = 'timer-box';
    disp.className = 'timer-display';
    stat.className = 'status';
    txt.textContent = 'NEČINNÝ';
  }
  dot.className = 'dot';
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').disabled  = true;
}

// ── Tracking ─────────────────────────────────────────────────────────────────
function startTracking() {
  isRunning = true;
  startTime = Date.now();
  document.getElementById('saveBanner').textContent = '';
  setUIRunning(activeProject ? 'loaded' : 'running');
  tick();
}

function stopTracking() {
  if (!isRunning) return;
  isRunning = false;
  cancelAnimationFrame(tickId);

  const newMs   = Date.now() - startTime;
  const totalMs = baseMs + newMs;

  setUIIdle(false);
  document.getElementById('resumeBanner').textContent = '';
  removeCancelBtn();

  if (newMs < 1000) {
    document.getElementById('saveBanner').textContent = '⚠  Príliš krátke, neuložené.';
    resetState(); return;
  }

  const today = todayStr();
  const name  = document.getElementById('nameInput').value.trim() || 'Neznámy projekt';

  if (activeProject) {
    const proj  = projects.find(p => p.id === activeProject.id);
    if (proj) {
      const entry = proj.entries.find(e => e.date === today);
      if (entry) entry.duration_ms += newMs;
      else proj.entries.push({ date: today, duration_ms: newMs });
      document.getElementById('saveBanner').textContent =
        `✓  Uložené — dnes +${fmsDur(newMs)} / projekt celkom ${fmsDur(projTotal(proj))}`;
    }
  } else {
    let proj = projects.find(p => p.program.toLowerCase() === name.toLowerCase());
    if (proj) {
      const entry = proj.entries.find(e => e.date === today);
      if (entry) entry.duration_ms += newMs;
      else proj.entries.push({ date: today, duration_ms: newMs });
    } else {
      proj = { id: Date.now(), program: name, entries: [{ date: today, duration_ms: newMs }] };
      projects.unshift(proj);
    }
    document.getElementById('saveBanner').textContent =
      `✓  Uložené — dnes ${fmsDur(newMs)} / projekt celkom ${fmsDur(projTotal(proj))}`;
  }

  saveProjects(projects);
  renderHistory();
  resetState();
}

function resetState() {
  baseMs        = 0;
  activeProject = null;
  document.getElementById('timerDisplay').textContent = '00:00:00';
  document.querySelectorAll('.proj-card').forEach(c => c.classList.remove('selected'));
}

// ── Load project ─────────────────────────────────────────────────────────────
function loadProject(proj) {
  if (isRunning) { alert('Najprv zastav aktuálne sledovanie.'); return; }

  const today   = todayStr();
  const entry   = proj.entries.find(e => e.date === today);
  baseMs        = entry ? entry.duration_ms : 0;
  activeProject = proj;

  document.getElementById('nameInput').value = proj.program;
  document.getElementById('timerDisplay').textContent = fmsTimer(baseMs);
  document.getElementById('saveBanner').textContent = '';

  const total     = projTotal(proj);
  const todayInfo = baseMs > 0 ? `  (dnes už ${fmsDur(baseMs)})` : '';
  document.getElementById('resumeBanner').textContent =
    `↺  Načítaný: "${proj.program}" — celkom ${fmsDur(total)}${todayInfo}`;

  setUIIdle(true);
  addCancelBtn();

  document.querySelectorAll('.proj-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('proj_' + proj.id)?.classList.add('selected');
}

// ── Cancel button ─────────────────────────────────────────────────────────────
function addCancelBtn() {
  if (document.getElementById('btnCancel')) return;
  const btn = document.createElement('button');
  btn.className = 'btn btn-cancel';
  btn.id        = 'btnCancel';
  btn.textContent = '✕';
  btn.onclick = cancelLoad;
  document.getElementById('btnRow').appendChild(btn);
}
function removeCancelBtn() {
  document.getElementById('btnCancel')?.remove();
}
function cancelLoad() {
  if (isRunning) { isRunning = false; cancelAnimationFrame(tickId); }
  setUIIdle(false);
  document.getElementById('resumeBanner').textContent = '';
  document.getElementById('saveBanner').textContent = '↩  Výber zrušený.';
  document.getElementById('timerDisplay').textContent = '00:00:00';
  removeCancelBtn();
  resetState();
}

// ── Delete helpers ────────────────────────────────────────────────────────────
function deleteProject(id) {
  const proj = projects.find(p => p.id === id);
  if (!proj) return;
  if (!confirm(`Vymazať celý projekt "${proj.program}"?`)) return;
  projects = projects.filter(p => p.id !== id);
  saveProjects(projects);
  renderHistory();
}
function deleteEntry(projId, date) {
  const proj = projects.find(p => p.id === projId);
  if (!proj) return;
  if (!confirm(`Vymazať záznam z dňa ${fmtDate(date)}?`)) return;
  proj.entries = proj.entries.filter(e => e.date !== date);
  if (!proj.entries.length) projects = projects.filter(p => p.id !== projId);
  saveProjects(projects);
  renderHistory();
}

// ── Render history ────────────────────────────────────────────────────────────
function renderHistory() {
  const list = document.getElementById('histList');
  list.innerHTML = '';

  if (!projects.length) {
    list.innerHTML = '<div class="empty-msg">— žiadne projekty —</div>';
    document.getElementById('grandTotal').textContent = '';
    return;
  }

  let grand = 0;
  projects.forEach(proj => {
    const total    = projTotal(proj);
    grand         += total;
    const isOpen   = openProjects.has(proj.id);
    const resumed  = proj.entries.some(e => e._resumed);

    const card = document.createElement('div');
    card.className = 'proj-card';
    card.id = 'proj_' + proj.id;

    // Sorted entries desc
    const sorted = [...proj.entries].sort((a,b) => b.date.localeCompare(a.date));

    card.innerHTML = `
      <div class="proj-header" onclick="toggleProject(${proj.id})">
        <span class="proj-chevron ${isOpen ? 'open' : ''}">▶</span>
        <span class="proj-icon">📁</span>
        <span class="proj-name">${proj.program}</span>
        <span class="proj-total">${fmsDur(total)}</span>
        <button class="proj-delete" onclick="event.stopPropagation();deleteProject(${proj.id})">×</button>
      </div>
      <div class="entries ${isOpen ? 'open' : ''}">
        ${sorted.map(e => `
          <div class="entry-row">
            <span class="entry-date">${fmtDate(e.date)}</span>
            <span class="entry-dur">${fmsDur(e.duration_ms)}</span>
            <button class="entry-del" onclick="deleteEntry(${proj.id},'${e.date}')">×</button>
          </div>
        `).join('')}
      </div>
    `;

    // Tap on header (not chevron/delete) → load project
    card.querySelector('.proj-header').addEventListener('click', function(ev) {
      if (ev.target.classList.contains('proj-delete')) return;
      // short tap = load, handled below via separate listener on name/icon
    });

    // Load on tap of name/icon
    const ph = card.querySelector('.proj-header');
    let tapTimer;
    ph.addEventListener('touchstart', () => { tapTimer = Date.now(); }, { passive: true });
    ph.addEventListener('touchend', (ev) => {
      if (ev.target.classList.contains('proj-delete')) return;
      if (Date.now() - tapTimer < 300) loadProject(proj);
    }, { passive: true });

    // Desktop click
    ph.addEventListener('click', (ev) => {
      if (ev.target.classList.contains('proj-delete')) return;
      if (ev.target.classList.contains('proj-chevron')) return;
      loadProject(proj);
    });

    list.appendChild(card);
  });

  document.getElementById('grandTotal').textContent = `Celkom: ${fmsDur(grand)}`;
}

function toggleProject(id) {
  if (openProjects.has(id)) openProjects.delete(id);
  else openProjects.add(id);
  renderHistory();
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderHistory();
</script>
</body>
</html>
